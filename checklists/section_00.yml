section: 0
title: "IMMUTABLE INFRA"
file_pattern: "## 0. IMMUTABLE INFRA"
min_words: 50
checks:
  - id: ci_files_listed
    description: "CI workflow files listed (.github/workflows/)"
    pattern: "github/workflows"
    weight: 20

  - id: test_harness_listed
    description: "Test harness files listed"
    pattern: "(jest|test|__tests__|maestro)"
    weight: 20

  - id: config_files_listed
    description: "Config files listed (app.json, tsconfig.json)"
    pattern: "(app\\.json|tsconfig)"
    weight: 20

  - id: reasons_given
    description: "Reason for immutability provided for each file"
    min_lines_with_pattern: 3
    pattern: "^[\\s]*[-*].*:.*"
    weight: 20

  - id: real_paths
    description: "File paths consistent with actual repo structure"
    pattern: "(src/|\\./|\\.github/|config/)"
    weight: 20
